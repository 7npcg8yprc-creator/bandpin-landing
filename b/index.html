<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Band in BandPin</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#0f0f12;
  color:white;
  text-align:center;
}

.container{
  max-width:520px;
  margin:auto;
  padding:40px 20px;
}

.logo{
  width:120px;
  margin-bottom:20px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

.band{
  font-size:20px;
  color:#aaa;
  margin-bottom:30px;
}

.button{
  display:block;
  text-decoration:none;
  background:#6c5ce7;
  padding:16px;
  margin:12px 0;
  border-radius:12px;
  color:white;
  font-weight:600;
}

.button.secondary{
  background:#2d3436;
}

.footer{
  margin-top:40px;
  color:#666;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<img src="/bandpin-logo.png" class="logo">

<h1>Open this band in BandPin</h1>

<div id="bandName" class="band"></div>

<a id="openApp" class="button">Open in BandPin</a>

<a class="button secondary" href="https://apps.apple.com">
Download on the App Store
</a>

<a class="button secondary" href="#">
Get it on Google Play
</a>

<div class="footer">
Discover bands near you with BandPin
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const slug = params.get("slug")

if(slug){

  const bandName = slug
  .replace(/-/g," ")
  .replace(/\b\w/g,l=>l.toUpperCase())

  document.getElementById("bandName").innerText = bandName

  document.getElementById("openApp").href =
  "bandpin://band/" + slug

}else{

  document.getElementById("bandName").innerText =
  "Band not specified"

}

</script>

</body>
</html>
